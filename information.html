<form action="Salvar.php" method="POST">

    <div class="mb-3">

            <option value="Plástico">Plástico / Metal</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="Peso" class="form-label">Peso Estimado (kg)</label>
        <input type="number" name="peso_estimado" step="0.1" class="form-control" id="Peso" placeholder="0.5" required>
    </div>
    <button type="submit" class="btn btn-success w-100">
        <i class="bi bi-plus-circle"></i> Cadastrar
    </button>
</form>
